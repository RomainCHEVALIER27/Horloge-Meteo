<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Widget Anthias - Horloge & Météo</title>
    <style>
        body { 
            background: #080C14; 
            color: #FFFFFF; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        #clock { 
            font-size: 16vw; 
            font-weight: bold; 
            line-height: 1; 
            letter-spacing: -2px;
        }
        #date { 
            font-size: 4vw; 
            color: #00E676; 
            margin: 10px 0; 
            text-transform: capitalize; 
        }
        #week { 
            font-size: 2vw; 
            color: #445566; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        #weather-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-top: 2px solid #00E676; 
            padding-top: 20px; 
            width: 85%; 
        }
        .city-name { font-size: 5vw; margin-right: 25px; font-weight: 300; }
        
        /* Harmonisation de la taille des icônes SVG */
        .w-icon-svg { 
            width: 10vw; 
            height: 10vw; 
            vertical-align: middle;
        }
        
        .temp { font-size: 7vw; color: #00E676; margin-left: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>
    <div id="date">Chargement...</div>
    <div id="week">SEMAINE --</div>
    
    <div id="weather-container">
        <span class="city-name">Vouzeron</span>
        <div id="w-icon-box"></div>
        <span id="w-temp" class="temp">--°C</span>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
            });
            document.getElementById('date').innerText = now.toLocaleDateString('fr-FR', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            });
        }

        function updateWeek() {
            const now = new Date();
            const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
            document.getElementById('week').innerText = "SEMAINE " + weekNo;
        }

        async function updateWeather() {
            try {
                const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=47.2585&longitude=2.2217&current_weather=true");
                const data = await response.json();
                const code = data.current_weather.weathercode;
                const temp = Math.round(data.current_weather.temperature);

                // --- BIBLIOTHÈQUE D'ICÔNES HARMONISÉES ---
                const sun = '<svg class="w-icon-svg" viewBox="0 0 24 24" fill="#FFD700"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>';
                const cloudSun = '<svg class="w-icon-svg" viewBox="0 0 24 24"><path fill="#FFD700" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5z"/><path fill="#FFFFFF" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>';
                const cloud = '<svg class="w-icon-svg" viewBox="0 0 24 24" fill="#FFFFFF"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>';
                const fog = '<svg class="w-icon-svg" viewBox="0 0 24 24" fill="#B0BEC5"><path d="M3 15h18v-2H3v2zm0 4h18v-2H3v2zm0-8h18V9H3v2zm0-4h18V5H3v2z"/></svg>';
                const rain = '<svg class="w-icon-svg" viewBox="0 0 24 24" fill="#87CEEB"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4s-6.67 2.59-7.35 6.04C2.34 10.36 0 12.91 0 16c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM9 18v3m3-3v3m3-3v3"/></svg>';
                const snow = '<svg class="w-icon-svg" viewBox="0 0 24 24" fill="#E3F2FD"><path d="M19 15l-1.5-1.5L16 15l-1.5-1.5L13 15l-1.5-1.5L10 15V5h2v4l2-2 2 2V5h2v10zM12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z"/></svg>';
                const storm = '<svg class="w-icon-svg" viewBox="0 0 24 24"><path fill="#FFFFFF" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/><path fill="#FFD700" d="M11 21l-1-2h2l-1-2h2l-2 4z"/></svg>';

                const iconMap = {
                    0: sun, 1: cloudSun, 2: cloudSun, 3: cloud,
                    45: fog, 48: fog,
                    51: rain, 53: rain, 55: rain,
                    61: rain, 63: rain, 65: rain,
                    71: snow, 73: snow, 75: snow,
                    80: storm, 81: storm, 82: storm,
                    95: storm, 96: storm, 99: storm
                };

                document.getElementById('w-icon-box').innerHTML = iconMap[code] || sun;
                document.getElementById('w-temp').innerText = temp + "°C";
            } catch (e) { 
                console.error("Erreur météo");
            }
        }

        setInterval(updateTime, 1000);
        setInterval(updateWeek, 3600000); 
        setInterval(updateWeather, 900000); 
        
        updateTime();
        updateWeek();
        updateWeather();
    </script>
</body>
</html>
