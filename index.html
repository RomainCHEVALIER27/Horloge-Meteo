<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Widget Anthias - Horloge & Météo</title>
    <style>
        body { 
            background: #080C14; 
            color: #FFFFFF; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        #clock { 
            font-size: 16vw; 
            font-weight: bold; 
            line-height: 1; 
            letter-spacing: -2px;
        }
        #date { 
            font-size: 4vw; 
            color: #00E676; 
            margin: 10px 0; 
            text-transform: capitalize; 
        }
        #week { 
            font-size: 2vw; 
            color: #445566; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        #weather-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-top: 2px solid #00E676; 
            padding-top: 20px; 
            width: 85%; 
        }
        .city-name { font-size: 5vw; margin-right: 25px; font-weight: 300; }
        .icon { font-size: 8vw; }
        .temp { font-size: 7vw; color: #00E676; margin-left: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>
    <div id="date">Chargement...</div>
    <div id="week">SEMAINE --</div>
    
    <div id="weather-container">
        <span class="city-name">Vouzeron</span>
        <span id="w-icon" class="icon">⌛</span>
        <span id="w-temp" class="temp">--°C</span>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
            });
            document.getElementById('date').innerText = now.toLocaleDateString('fr-FR', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            });
        }

        function updateWeek() {
            const now = new Date();
            const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
            document.getElementById('week').innerText = "SEMAINE " + weekNo;
        }

        async function updateWeather() {
            try {
                const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=47.2585&longitude=2.2217&current_weather=true");
                if (!response.ok) throw new Error();
                const data = await response.json();
                const code = data.current_weather.weathercode;
                const temp = Math.round(data.current_weather.temperature);
                const icons = {
                    0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️", 45: "🌫️", 48: "🌫️",
                    51: "🌦️", 53: "🌦️", 55: "🌦️", 61: "🌧️", 63: "🌧️", 65: "🌧️",
                    71: "❄️", 73: "❄️", 75: "❄️", 80: "⛈️", 81: "⛈️", 82: "⛈️",
                    95: "⚡", 96: "⚡", 99: "⚡"
                };
                document.getElementById('w-icon').innerText = icons[code] || "🌡️";
                document.getElementById('w-temp').innerText = temp + "°C";
            } catch (e) {
                document.getElementById('w-icon').innerText = "⚠️";
                document.getElementById('w-temp').innerText = "--";
            }
        }

        setInterval(updateTime, 1000);
        setInterval(updateWeek, 3600000); // Une fois par heure
        setInterval(updateWeather, 900000); 
        
        updateTime();
        updateWeek();
        updateWeather();
    </script>
</body>
</html>
